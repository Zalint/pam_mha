<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Utilisateurs - Suivi PAM</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/notifications.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <h1>Gestion des Utilisateurs</h1>
            <div class="header-user">
                <a href="/index.html" class="btn-icon" title="Retour au dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </a>
                <span id="userName">Admin</span>
                <button class="btn-icon" id="changePasswordBtn" title="Changer mon mot de passe">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                </button>
                <button class="btn-icon" id="logoutBtn" title="Déconnexion">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Container -->
        <div class="app-container">
            <!-- Toolbar -->
            <div class="filters-bar" style="margin-bottom: 2rem;">
                <input type="text" id="searchUsers" class="input" placeholder="Rechercher un utilisateur..." style="flex: 1;">
                <select id="filterRole" class="select">
                    <option value="">Tous les rôles</option>
                    <option value="Admin">Admin</option>
                    <option value="Ministre">Ministre</option>
                    <option value="Directeur">Directeur</option>
                </select>
                <button class="btn btn-primary" id="addUserBtn">+ Nouvel utilisateur</button>
            </div>

            <!-- Liste des utilisateurs -->
            <div id="usersList" class="users-list">
                <div class="loading">Chargement des utilisateurs...</div>
            </div>
        </div>
    </div>

    <!-- Modal d'édition d'utilisateur -->
    <div class="modal" id="userModal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3 id="modalTitle">Nouvel utilisateur</h3>
                <button class="btn-icon" id="closeModalBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <form id="userForm" class="modal-body">
                <input type="hidden" id="userId">
                
                <div class="form-group">
                    <label for="fullName">Nom complet *</label>
                    <input type="text" id="fullName" class="input" required>
                </div>

                <div class="form-group">
                    <label for="username">Nom d'utilisateur *</label>
                    <input type="text" id="username" class="input" required>
                </div>

                <div class="form-group" id="passwordGroup">
                    <label for="password">Mot de passe *</label>
                    <input type="password" id="password" class="input" minlength="6" autocomplete="new-password">
                    <small class="text-muted">Minimum 6 caractères</small>
                </div>

                <div class="form-group">
                    <label for="role">Rôle *</label>
                    <select id="role" class="select" required>
                        <option value="">Sélectionner un rôle</option>
                        <option value="Admin">Admin</option>
                        <option value="Ministre">Ministre</option>
                        <option value="Directeur">Directeur</option>
                    </select>
                </div>

                <!-- Section Assignations (visible uniquement pour Directeur) -->
                <div id="assignmentsSection" style="display: none;">
                    <hr style="margin: 2rem 0; border: none; border-top: 2px solid var(--border-color);">
                    
                    <h4 style="margin-bottom: 1rem; color: var(--color-primary);">Assignations</h4>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="assignAll" style="margin-right: 0.5rem;">
                            <strong>Tous les programmes et actions</strong>
                            <br>
                            <small class="text-muted">Accès complet à toutes les données (remplace l'ancien "Directeur de Cabinet")</small>
                        </label>
                    </div>

                    <div id="assignmentsList" style="margin-top: 1.5rem;">
                        <div class="form-group">
                            <input type="text" id="searchAssignments" class="input" placeholder="Rechercher un programme ou une action...">
                        </div>

                        <div style="max-height: 400px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 1rem;">
                            <div id="programmesAssignments">
                                <div class="loading">Chargement des programmes...</div>
                            </div>
                        </div>

                        <div class="assignment-summary" id="assignmentSummary" style="margin-top: 1rem; padding: 1rem; background: var(--color-bg); border-radius: var(--border-radius);">
                            <strong>Résumé des assignations :</strong>
                            <div id="summaryText" style="margin-top: 0.5rem; color: var(--color-text-light);"></div>
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 2rem;">
                    <label>
                        <input type="checkbox" id="isActive" checked style="margin-right: 0.5rem;">
                        Compte actif
                    </label>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Annuler</button>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/notifications.js"></script>
    <script src="/api.js"></script>
    <script src="/users.js"></script>
</body>
</html>
